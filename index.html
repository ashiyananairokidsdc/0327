<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>患者管理ダッシュボード｜芦屋医院</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--sf:#fff;--sf2:#f0efe9;
  --bd:rgba(0,0,0,.09);--bd2:rgba(0,0,0,.18);
  --tx:#1a1916;--tx2:#6b6a64;--tx3:#aaa9a0;
  --ac:#1D9E75;--ac-dk:#0F6E56;
  --bl:#185FA5;--bl-lt:#deeaf9;
  --pk:#993556;--pk-lt:#f7e2ea;
  --ok:#3B6D11;--ok-lt:#EAF3DE;
  --er:#A32D2D;--er-lt:#FCEBEB;
  --r:10px;--rs:6px
}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.6}
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;flex-shrink:0;background:#1a1916;color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.slogo{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.cn{font-size:13px;font-weight:600;letter-spacing:.04em}
.sn{font-size:11px;color:rgba(255,255,255,.38);margin-top:2px}
nav{flex:1;padding:10px 0}
.nv{display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.48);border-left:3px solid transparent;transition:all .15s;user-select:none}
.nv:hover{color:#fff;background:rgba(255,255,255,.06)}
.nv.active{color:#fff;border-left-color:var(--ac);background:rgba(255,255,255,.08);font-weight:500}
.sfoot{padding:14px 20px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:rgba(255,255,255,.26)}
.main{flex:1;overflow-y:auto;min-width:0;display:flex;flex-direction:column;position:relative}
.topbar{background:var(--sf);border-bottom:1px solid var(--bd);padding:13px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;flex-wrap:wrap;gap:8px}
.topbar-title{font-size:15px;font-weight:600}
.topbar-actions{display:flex;gap:8px;flex-wrap:wrap}
.content{padding:24px 28px;flex:1}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--rs);border:1px solid var(--bd2);background:var(--sf);color:var(--tx);font-size:13px;cursor:pointer;transition:all .15s;font-family:inherit;white-space:nowrap;line-height:1.4}
.btn:hover{background:var(--sf2)}.btn:active{transform:scale(.98)}
.btn-ac{background:var(--ac);border-color:var(--ac-dk);color:#fff}
.btn-ac:hover{background:var(--ac-dk)}
.stats-row{display:flex;gap:12px;margin-bottom:22px}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:16px 20px;min-width:140px}
.sc-lb{font-size:11px;color:var(--tx2);margin-bottom:6px;letter-spacing:.03em;font-weight:500}
.sc-vl{font-size:30px;font-weight:700;color:var(--tx);line-height:1}
.sc-vl.ak{color:var(--ac)}
.panel{display:none}.panel.active{display:block}
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.toolbar input[type=text]{flex:1;min-width:180px;padding:8px 12px;border:1px solid var(--bd2);border-radius:var(--rs);font-size:13px;background:var(--sf);color:var(--tx);font-family:inherit;outline:none;transition:border-color .15s}
.toolbar input[type=text]:focus{border-color:var(--ac)}
.toolbar select{padding:8px 12px;border:1px solid var(--bd2);border-radius:var(--rs);font-size:13px;background:var(--sf);color:var(--tx);font-family:inherit;cursor:pointer;outline:none;max-width:240px}
.tc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--tx2);background:var(--sf2);border-bottom:1px solid var(--bd);white-space:nowrap;letter-spacing:.03em}
tbody td{padding:10px 14px;border-bottom:1px solid var(--bd);color:var(--tx);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#fafaf8}
.badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600}
.bm{background:var(--bl-lt);color:var(--bl)}.bf{background:var(--pk-lt);color:var(--pk)}.bu{background:var(--sf2);color:var(--tx2)}
.pgn{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:11px 14px;border-top:1px solid var(--bd);font-size:12px;color:var(--tx2)}
.map-wrap{border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
#map{height:640px;width:100%;background:#eeecea}
.map-info{font-size:12px;color:var(--tx2);margin-bottom:10px;min-height:18px}
.map-legend-box{display:flex;gap:20px;flex-wrap:wrap;align-items:center;margin-top:12px;padding:12px 16px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);font-size:12px;color:var(--tx2)}
.legend-scale{display:flex;align-items:center;gap:8px}
.legend-step{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--tx2)}
.legend-dot{width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.15);flex-shrink:0}
.msg{padding:10px 14px;border-radius:var(--rs);font-size:13px;margin-bottom:14px;display:none}
.msg-er{background:var(--er-lt);color:var(--er);border:1px solid #f0a0a0}
.msg-ok{background:var(--ok-lt);color:var(--ok);border:1px solid #97C459}
.empty-msg{text-align:center;padding:48px;color:var(--tx3);font-size:13px}

/* アップロードプロンプト */
#uploadPrompt{
  position:fixed;inset:0;background:rgba(26,25,22,.72);
  display:flex;align-items:center;justify-content:center;
  z-index:100;backdrop-filter:blur(4px)
}
#uploadPrompt.drag-over .upload-card{border-color:var(--ac);background:var(--ac-lt)}
.upload-card{
  background:#fff;border-radius:16px;padding:48px 40px;text-align:center;
  border:2px dashed var(--bd2);max-width:420px;width:90%;
  box-shadow:0 20px 60px rgba(0,0,0,.3)
}
.upload-card h2{font-size:18px;font-weight:600;margin-bottom:8px;color:var(--tx)}
.upload-card p{font-size:13px;color:var(--tx2);margin-bottom:28px;line-height:1.7}
.upload-icon{font-size:48px;margin-bottom:16px}

@media(max-width:768px){.sidebar{display:none}.content{padding:14px}.topbar{padding:11px 14px}#map{height:440px}.upload-card{padding:32px 24px}}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="slogo"><div class="cn">芦屋医院</div><div class="sn">患者管理システム</div></div>
    <nav>
      <div class="nv active" onclick="switchPanel('list',this)"><span>👥</span> 患者一覧</div>
      <div class="nv" onclick="switchPanel('map',this)"><span>🗺</span> 地図マッピング</div>
    </nav>
    <div class="sfoot">院内限定 · 要配慮個人情報</div>
  </aside>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="pageTitle">患者一覧</div>
      <div class="topbar-actions">
        <input type="file" id="csvInput" accept=".csv" style="display:none">
        <button class="btn btn-ac" onclick="document.getElementById('csvInput').click()">📂 CSVを読み込む</button>
        <button class="btn" onclick="doExport()">⬇ エクスポート</button>
      </div>
    </div>
    <div class="content">
      <div id="msgEr" class="msg msg-er"></div>
      <div id="msgOk" class="msg msg-ok"></div>
      <div class="stats-row">
        <div class="sc"><div class="sc-lb">総患者数</div><div class="sc-vl ak" id="sT">0</div></div>
      </div>
      <div class="panel active" id="panel-list">
        <div class="toolbar">
          <input type="text" id="searchQ" placeholder="診察券番号・氏名・住所で検索...">
          <select id="fRegion"><option value="">地域：すべて</option></select>
          <select id="fAge"><option value="">年代：すべて</option><option value="0">0〜9歳</option><option value="10">10〜19歳</option><option value="20">20〜29歳</option><option value="30">30〜39歳</option><option value="40">40〜49歳</option><option value="50">50〜59歳</option><option value="60">60〜69歳</option><option value="70">70〜79歳</option><option value="80">80〜89歳</option><option value="90">90歳以上</option></select>
        </div>
        <div class="tc">
          <div class="tw">
            <table>
              <thead><tr>
                <th style="width:85px">診察券番号</th>
                <th style="width:130px">患者名</th>
                <th style="width:50px">年齢</th>
                <th style="width:105px">生年月日</th>
                <th style="width:48px">性別</th>
                <th style="width:90px">郵便番号</th>
                <th>住所</th>
              </tr></thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
          <div class="pgn">
            <span id="pgInfo"></span>
            <button class="btn" onclick="goPage(-1)" id="bPrev">前へ</button>
            <button class="btn" onclick="goPage(1)"  id="bNext">次へ</button>
          </div>
        </div>
      </div>
      <div class="panel" id="panel-map">
        <div class="map-info" id="mapInfo"></div>
        <div class="map-wrap"><div id="map"></div></div>
        <div class="map-legend-box">
          <div class="legend-scale">
            <div class="legend-step"><div class="legend-dot" style="background:#C8EFE2"></div>少ない</div>
            <div class="legend-step"><div class="legend-dot" style="background:#9FE1CB"></div></div>
            <div class="legend-step"><div class="legend-dot" style="background:#5DCAA5"></div>中程度</div>
            <div class="legend-step"><div class="legend-dot" style="background:#1D9E75"></div></div>
            <div class="legend-step"><div class="legend-dot" style="background:#0F6E56"></div>多い（最大 <span id="lgMax" style="font-weight:600;margin:0 2px">—</span> 名）</div>
          </div>
          <div style="color:var(--tx3);font-size:11px">バブルの大きさと色 = 患者数 · 数字 = 人数 · クリックで詳細</div>
          <span style="margin-left:auto;font-size:11px;color:var(--tx3)" id="mapTime"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- CSV読み込みプロンプト -->
<div id="uploadPrompt">
  <div class="upload-card">
    <div class="upload-icon">📄</div>
    <h2>CSVファイルを読み込む</h2>
    <p>アポツールからエクスポートした<br>患者一覧CSVをドロップ、または<br>ボタンから選択してください</p>
    <button class="btn btn-ac" style="font-size:14px;padding:10px 24px" onclick="document.getElementById('csvInput').click()">
      ファイルを選択
    </button>
    <div style="font-size:11px;color:var(--tx3);margin-top:16px">
      データはブラウザ内のみで処理されます。外部に送信されません。
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

var patients = [];
var currentPage = 1, PAGE = 20;
var mapInst = null, layerGrp = null, labelGrp = null;

window.addEventListener('load', function(){
  updateStats();
  renderTable();
  // アップロードエリアを前面に表示
  showUploadPrompt();
});

function showUploadPrompt(){
  document.getElementById('uploadPrompt').style.display = 'flex';
}
function hideUploadPrompt(){
  document.getElementById('uploadPrompt').style.display = 'none';
}

function numId(p){ var n=parseInt((p.id||'').replace(/[^0-9]/g,'')); return isNaN(n)?999999:n; }
function sortPatients(){ patients.sort(function(a,b){ return numId(a)-numId(b); }); }

function updateStats(){
  document.getElementById('sT').textContent = patients.length;
}

function ageGroup(p){
  var a=parseInt(p.age); if(isNaN(a)) return -1;
  return Math.min(Math.floor(a/10)*10, 90);
}

function buildRegionOptions(){
  // 患者データからエリア集計して動的に更新
  var counts = {};
  patients.forEach(function(p){
    var r = REGION_MAP[p.postal];
    if(r) counts[r] = (counts[r]||0)+1;
  });
  var sel = document.getElementById('fRegion');
  var cur = sel.value;
  var opts = '<option value="">地域：すべて</option>';
  Object.keys(counts).sort(function(a,b){return counts[b]-counts[a];}).forEach(function(r){
    opts += '<option value="'+esc(r)+'">'+esc(r)+'（'+counts[r]+'名）</option>';
  });
  sel.innerHTML = opts;
  sel.value = cur;
}

function getFiltered(){
  var q  = document.getElementById('searchQ').value.toLowerCase();
  var ag = document.getElementById('fAge').value;
  var rg = document.getElementById('fRegion').value;
  return patients.filter(function(pt){
    var mq = !q || (pt.id+'').toLowerCase().indexOf(q)>=0
                || pt.name.toLowerCase().indexOf(q)>=0
                || pt.address.toLowerCase().indexOf(q)>=0;
    return mq && (!ag||ageGroup(pt)===parseInt(ag)) && (!rg||REGION_MAP[pt.postal]===rg);
  });
}

function renderTable(){ currentPage=1; drawPage(); }
function drawPage(){
  var filtered=getFiltered(), total=filtered.length, start=(currentPage-1)*PAGE, page=filtered.slice(start,start+PAGE);
  var tbody=document.getElementById('tbody');
  if(!patients.length){
    tbody.innerHTML='<tr><td colspan="7" class="empty-msg">CSVファイルを読み込んでください</td></tr>';
    document.getElementById('pgInfo').textContent=''; return;
  }
  if(!filtered.length){ tbody.innerHTML='<tr><td colspan="7" class="empty-msg">条件に一致する患者が見つかりません</td></tr>'; return; }
  tbody.innerHTML=page.map(function(p){
    var isMale=p.gender==='男'||p.gender==='男性',isFemale=p.gender==='女'||p.gender==='女性';
    var bc=isMale?'bm':isFemale?'bf':'bu';
    return '<tr><td>'+esc(p.id)+'</td><td>'+esc(p.name)+'</td><td>'+esc(p.age)+'</td><td>'+esc(p.birth)+'</td>'+
      '<td><span class="badge '+bc+'">'+esc(p.gender)+'</span></td><td>'+esc(p.postal)+'</td>'+
      '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(p.address)+'">'+esc(p.address)+'</td></tr>';
  }).join('');
  var tp=Math.ceil(total/PAGE);
  document.getElementById('pgInfo').textContent=total+'件中 '+(start+1)+'–'+Math.min(start+PAGE,total)+'件';
  document.getElementById('bPrev').disabled=currentPage<=1;
  document.getElementById('bNext').disabled=currentPage>=tp;
}
function goPage(dir){ var tp=Math.ceil(getFiltered().length/PAGE); currentPage=Math.max(1,Math.min(tp,currentPage+dir)); drawPage(); }

/* ── 地図 ── */
var PALETTE=['#0F6E56','#1D9E75','#5DCAA5','#9FE1CB','#C8EFE2'];
function mColor(r){ return r>0.75?PALETTE[0]:r>0.5?PALETTE[1]:r>0.3?PALETTE[2]:r>0.1?PALETTE[3]:PALETTE[4]; }
function mRadius(count,max){ return Math.round(12+(count/max)*44); }

function initMap(){
  mapInst = L.map('map',{zoomControl:true}).setView([34.73,135.28],12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom:19, opacity:0.35
  }).addTo(mapInst);
  layerGrp = L.layerGroup().addTo(mapInst);
  labelGrp = L.layerGroup().addTo(mapInst);
  renderMap();
}

function renderMap(){
  if(!mapInst) return;
  var pm={};
  patients.forEach(function(p){
    if(!p.postal) return;
    var g=GEO_CACHE[p.postal];
    if(!g||g.lat<24||g.lat>46||g.lng<122||g.lng>154) return;
    pm[p.postal]=(pm[p.postal]||0)+1;
  });
  var vals=Object.values(pm), maxC=vals.length?Math.max.apply(null,vals):1;
  document.getElementById('lgMax').textContent=maxC+'名';
  document.getElementById('mapInfo').textContent=
    patients.length ? Object.keys(pm).length+'エリア・'+patients.filter(function(p){return p.postal&&GEO_CACHE[p.postal];}).length+'名をマッピング（クリックで患者一覧）'
                    : 'CSVを読み込むとマッピングされます';
  document.getElementById('mapTime').textContent=patients.length?'更新: '+new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}):'';
  layerGrp.clearLayers(); labelGrp.clearLayers();
  var allLL=[];
  Object.keys(pm).forEach(function(code){
    var g=GEO_CACHE[code]; if(!g) return;
    var count=pm[code], ratio=count/maxC;
    var color=mColor(ratio), radius=mRadius(count,maxC);
    allLL.push([g.lat,g.lng]);
    var circle=L.circleMarker([g.lat,g.lng],{radius:radius,fillColor:color,color:'#fff',weight:2.5,opacity:1,fillOpacity:0.85});
    var tc=ratio>0.45?'#fff':'#0F3D2B';
    var shadow=tc==='#fff'?'0 1px 3px rgba(0,0,0,.7)':'0 1px 2px rgba(255,255,255,.9)';
    var lIcon=L.divIcon({
      className:'',
      html:'<div style="font-family:sans-serif;font-weight:800;font-size:'+(count>=100?'10':count>=10?'11':'12')+'px;color:'+tc+';text-shadow:'+shadow+';text-align:center;line-height:1;pointer-events:none">'+count+'</div>',
      iconSize:[radius*2,radius*2],iconAnchor:[radius,radius]
    });
    L.marker([g.lat,g.lng],{icon:lIcon,interactive:false,zIndexOffset:1000}).addTo(labelGrp);
    var pts=patients.filter(function(p){return p.postal===code;});
    var rows=pts.map(function(p){
      return '<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f0f0f0">'+
        '<span style="font-size:13px">'+esc(p.name)+'</span>'+
        '<span style="font-size:11px;color:#999;white-space:nowrap;margin-left:8px">'+esc(p.age)+'歳 '+esc(p.gender)+'</span></div>';
    }).join('');
    circle.bindPopup(
      '<div style="font-family:sans-serif;width:280px">'+
      '<div style="border-bottom:2px solid #e8e8e8;padding-bottom:10px;margin-bottom:10px">'+
        '<div style="font-size:12px;color:#999;margin-bottom:2px">〒'+esc(code)+'　'+esc(g.addr)+'</div>'+
        '<div style="font-size:26px;font-weight:800;color:'+color+';line-height:1">'+count+'<span style="font-size:14px;font-weight:500;color:#999;margin-left:4px">名</span></div>'+
      '</div>'+
      '<div style="max-height:260px;overflow-y:auto;padding-right:4px">'+rows+'</div></div>',
      {maxWidth:320,minWidth:280}
    );
    circle.on('mouseover',function(){circle.setStyle({weight:3.5,color:'#333',fillOpacity:0.97});});
    circle.on('mouseout', function(){circle.setStyle({weight:2.5,color:'#fff',fillOpacity:0.85});});
    circle.addTo(layerGrp);
  });
  if(allLL.length){ mapInst.fitBounds(L.latLngBounds(allLL),{padding:[50,50]}); }
}

function switchPanel(id,el){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nv').forEach(function(n){n.classList.remove('active');});
  document.getElementById('panel-'+id).classList.add('active');
  el.classList.add('active');
  document.getElementById('pageTitle').textContent=id==='list'?'患者一覧':'地図マッピング';
  if(id==='map'){
    if(!mapInst) initMap();
    else setTimeout(function(){mapInst.invalidateSize();renderMap();},100);
  }
}

function parseCSV(text){
  if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);
  text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  var lines=[],cur='',inQ=false;
  for(var i=0;i<text.length;i++){
    var c=text[i];
    if(c==='"'){if(inQ&&text[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c==='\n'&&!inQ){lines.push(cur);cur='';}else cur+=c;
  }
  if(cur.trim()) lines.push(cur);
  function sr(l){var cs=[],cell='',q=false;for(var i=0;i<l.length;i++){var c=l[i];if(c==='"'){if(q&&l[i+1]==='"'){cell+='"';i++;}else q=!q;}else if(c===','&&!q){cs.push(cell.trim());cell='';}else cell+=c;}cs.push(cell.trim());return cs;}
  var rows=lines.map(sr).filter(function(r){return r.join('').trim()!=='';});
  if(rows.length<2) return{error:'データ不足'};
  var h=rows[0];
  function ci(cands){for(var i=0;i<h.length;i++){var hh=h[i].trim().replace(/\s+/g,'');for(var j=0;j<cands.length;j++)if(hh===cands[j])return i;}return -1;}
  var C={id:ci(['診察券番号','患者番号','id']),name:ci(['患者名','氏名','name']),age:ci(['年齢','age']),birth:ci(['生年月日','birthdate']),gender:ci(['性別','gender']),postal:ci(['郵便番号１','郵便番号1','郵便番号','postal']),addr:ci(['住所１','住所1','住所','address'])};
  var res=[];
  for(var i=1;i<rows.length;i++){
    var r=rows[i],g=function(idx){return idx>=0&&idx<r.length?r[idx]:'';};
    var pr=g(C.postal).replace(/[^0-9]/g,''),pf=pr.length===7?pr.slice(0,3)+'-'+pr.slice(3):'';
    var bd=g(C.birth),m=bd.match(/([0-9]{4})[^0-9]*年([0-9]{1,2})月([0-9]{1,2})日/);
    var bf=m?m[1]+'/'+m[2].padStart(2,'0')+'/'+m[3].padStart(2,'0'):bd;
    var nm=g(C.name);if(!nm||nm==='テスト'||nm==='テストさん')continue;
    res.push({id:g(C.id),name:nm,age:g(C.age),birth:bf,gender:g(C.gender),postal:pf,address:g(C.addr)});
  }
  return{data:res};
}

function loadCSV(file){
  var reader=new FileReader();
  reader.onload=function(ev){
    var buf=ev.target.result,bytes=new Uint8Array(buf),hasSjis=false;
    for(var i=0;i<Math.min(bytes.length,2000);i++){if((bytes[i]>=0x81&&bytes[i]<=0x9F)||(bytes[i]>=0xE0&&bytes[i]<=0xFC)){hasSjis=true;break;}}
    var text;try{text=new TextDecoder(hasSjis?'shift_jis':'utf-8').decode(buf);}catch(err){showMsg('er','文字コードエラー');return;}
    var res=parseCSV(text);if(res.error){showMsg('er',res.error);return;}
    patients=res.data; sortPatients();
    hideUploadPrompt();
    showMsg('ok',patients.length+'件を読み込みました');
    updateStats(); buildRegionOptions(); renderTable();
    if(mapInst) renderMap();
  };
  reader.readAsArrayBuffer(file);
}

function doExport(){
  if(!patients.length){alert('データがありません');return;}
  var lines=['\uFEFF診察券番号,患者名,年齢,生年月日,性別,郵便番号,住所'];
  patients.forEach(function(p){
    lines.push([p.id,p.name,p.age,p.birth,p.gender,p.postal,p.address].map(function(v){return'"'+String(v||'').replace(/"/g,'""')+'"';}).join(','));
  });
  var blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='患者データ_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
}

function showMsg(type,text){
  ['msgEr','msgOk'].forEach(function(id){document.getElementById(id).style.display='none';});
  var el=document.getElementById(type==='er'?'msgEr':'msgOk');el.textContent=text;el.style.display='block';
  setTimeout(function(){el.style.display='none';},4000);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('searchQ').addEventListener('input',renderTable);
  document.getElementById('fAge').addEventListener('change',renderTable);
  document.getElementById('fRegion').addEventListener('change',renderTable);

  // ファイル選択
  document.getElementById('csvInput').addEventListener('change',function(e){
    var f=e.target.files[0];if(!f)return;e.target.value='';loadCSV(f);
  });

  // ドラッグ&ドロップ（画面全体）
  var dropZone = document.getElementById('uploadPrompt');
  dropZone.addEventListener('dragover',function(e){e.preventDefault();dropZone.classList.add('drag-over');});
  dropZone.addEventListener('dragleave',function(){dropZone.classList.remove('drag-over');});
  dropZone.addEventListener('drop',function(e){
    e.preventDefault();dropZone.classList.remove('drag-over');
    var f=e.dataTransfer.files[0];if(f)loadCSV(f);
  });
});
